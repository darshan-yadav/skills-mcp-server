name: CI/CD Pipeline (DevOps Agent)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    name: Reviewer Agent (Tests & Linting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pip install -r requirements.txt
          # pip install pytest flake8
          
      - name: Run Linter
        run: |
          echo "Simulating code review / linting..."
          # flake8 .
          
      - name: Run Tests
        run: |
          echo "Simulating unit tests..."
          # pytest

  build-and-publish:
    name: DevOps Agent (Publish Artifacts)
    needs: test-and-lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        run: |
          echo "Simulating docker build..."
          # docker build -t ghcr.io/${{ github.repository }}:latest .
          # docker push ghcr.io/${{ github.repository }}:latest

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Simulating PyPI publish for tag ${{ github.ref_name }}..."
