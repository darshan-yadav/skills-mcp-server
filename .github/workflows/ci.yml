name: CI/CD Pipeline (DevOps Agent)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs on the same branch / PR when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default least-privilege permissions. The publish job overrides these.
permissions:
  contents: read

jobs:
  test-and-lint:
    name: Reviewer Agent (Tests & Linting)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        # Assumes pyproject.toml defines an optional-dependency group named "dev"
        # containing pytest, pytest-asyncio, and ruff. A Developer Agent is
        # building pyproject.toml in parallel; until it lands this step will
        # fail cleanly and the failure is expected.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest -q

  build-and-publish:
    name: DevOps Agent (Publish Artifacts)
    needs: test-and-lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    # Publish job needs to write to GHCR and mint an OIDC token for PyPI
    # trusted publishing.
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image_tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            {
              echo "tags<<EOF"
              echo "ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
              echo "ghcr.io/${{ github.repository }}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "ghcr.io/${{ github.repository }}:edge"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # NOTE: the Dockerfile does not exist yet (landing in Wave 4 / §13.1 of
      # SPEC.md). This step will fail at runtime until the Dockerfile is
      # committed to the repo root. That's expected and fine for now.
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- PyPI publish: only on tag push ---

      - name: Set up Python (for sdist/wheel build)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        if: startsWith(github.ref, 'refs/tags/')
        run: python -m build

      - name: Publish to PyPI (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/')
        # No API token in YAML — the PyPI project must be configured with a
        # trusted publisher pointing at this repo + workflow + environment.
        # See https://docs.pypi.org/trusted-publishers/
        uses: pypa/gh-action-pypi-publish@release/v1
